<!DOCTYPE html>
<html>
<head>
<title>Facebook Login</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

table{
    border-collapse:collapse;
}

.main{
    width:100%;
    height:700px;
}

.left{
    width:50%;
    padding-left:40px;
    vertical-align:top;
}

.right{
    width:50%;
    vertical-align:top;
    border-left:1px solid lightgray;
}

.logo{
    margin-top:40px;
}

.text{
    font-size:60px;
    font-weight:bold;
    margin-top:100px;
    line-height:1.1;
}

.blue{
    color:#1877f2;
}

.formbox{
    width:550px;
    margin:120px auto;
}

input{
    width:100%;
    height:50px;
    border:1px solid #ccc;
    border-radius:15px;
    padding-left:15px;
    font-size:18px;
}

.loginbtn{
    width:100%;
    height:50px;
    background:#1877f2;
    color:white;
    border:none;
    border-radius:25px;
    font-size:20px;
    font-weight:bold;
}

.createbtn{
    width:100%;
    height:50px;
    background:white;
    color:#1877f2;
    border:1px solid #1877f2;
    border-radius:25px;
    font-size:20px;
}

.footer{
    border-top:1px solid lightgray;
    text-align:center;
    padding:20px;
    color:gray;
    font-size:14px;
}

a{
    color:gray;
    text-decoration:none;
    margin:8px;
}

</style>

</head>

<body>

<table class="main">

<td class="left">

<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg"
width="70">

<table>
<tr>

<td valign="top">

<div class="text">
Explore<br>
the<br>
things<br>
<span class="blue">you</span><br>
<span class="blue">love</span>.
</div>

</td>

<td valign="middle">

<img src="https://static.xx.fbcdn.net/rsrc.php/yb/r/HpEiFYDux5j.webp"
     width="350">

</td>

</tr>
</table>

</td>

<td class="right">

<div class="formbox">

<h2>Log in to Facebook</h2>

<form>

<input type="text"
placeholder="Email address or mobile number">

<br><br>

<input type="password"
placeholder="Password">

<br><br>

<a href=""><input type="submit"  value="Log in" class="loginbtn"></a>

</form>

<br>

<center>
<h3><a href="">Forgotten password?</a></h3>
</center>

<br><br>

<button class="createbtn">
<a href="face.html">Create new account</a>
</button>

<br><br>

<center>

<img
src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Meta-Logo.png"
width="70">

</center>

</div>

</td>

</tr>

</table>


</body>
</html>
